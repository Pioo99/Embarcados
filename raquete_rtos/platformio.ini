[env:blackpill_f411ce]
platform          = ststm32
board             = blackpill_f411ce
framework         = cmsis
board_build.mcu   = stm32f411ceu6
board_build.f_cpu = 96000000L
upload_protocol   = serial
upload_port       = COM4
upload_speed      = 115200

monitor_port      = COM4
monitor_speed     = 115200

; -Iinclude → FreeRTOSConfig.h visível para o kernel em lib/freertos
; FPU hard-float → exigido pelo port ARM_CM4F do FreeRTOS
build_flags       = -Iinclude -mfloat-abi=hard -mfpu=fpv4-sp-d16
extra_scripts     = pre:extra_link_flags.py
